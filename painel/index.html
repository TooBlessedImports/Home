<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Too Blessed Imports — Painel Admin</title>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='8' fill='%230a0a0a'/%3E%3Ctext x='50' y='38' font-family='serif' font-size='28' font-weight='900' fill='white' text-anchor='middle' letter-spacing='-1'%3ETB%3C/text%3E%3Ctext x='50' y='62' font-family='sans-serif' font-size='10' fill='%23666' text-anchor='middle' letter-spacing='3'%3EIMPORTS%3C/text%3E%3C/svg%3E"/>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}

  body{
    font-family:'DM Sans',sans-serif;
    background:#0a0a0a;
    color:#e8e8e8;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  /* ===== HEADER ===== */
  .hdr{
    background:#0a0a0a;
    border-bottom:1px solid #1e1e1e;
    padding:0 2rem;
    display:flex;
    align-items:center;
    justify-content:space-between;
    height:64px;
    position:sticky;
    top:0;
    z-index:100;
  }
  .logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:5px;color:#fff;line-height:1;}
  .logo span{color:#555;font-size:10px;letter-spacing:3px;display:block;font-family:'DM Sans',sans-serif;font-weight:300;text-transform:uppercase;margin-top:2px;}
  .hdr-tag{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#333;border:1px solid #1e1e1e;padding:4px 12px;border-radius:2px;}

  .btn-p{
    background:#fff;
    color:#000;
    border:none;
    padding:12px;
    font-family:'DM Sans',sans-serif;
    font-size:12px;
    font-weight:500;
    letter-spacing:2px;
    text-transform:uppercase;
    cursor:pointer;
    border-radius:2px;
    transition:background .2s;
  }
  .btn-p:hover{background:#ddd;}

  /* ===== ADMIN PANEL ===== */
  #adminPanel{
    display:none;
    flex:1;
    flex-direction:column;
  }
  #adminPanel.visible{display:flex;}

  .admin-wrap{
    max-width:900px;
    width:100%;
    margin:0 auto;
    padding:2rem;
    display:flex;
    flex-direction:column;
    gap:24px;
  }

  .panel-hdr{
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid #1a1a1a;
    padding-bottom:1.2rem;
  }
  .panel-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:5px;color:#fff;}
  .panel-title span{font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:2px;color:#444;font-weight:300;display:block;margin-top:2px;}

  .logout-btn{
    background:none;
    border:1px solid #222;
    color:#555;
    padding:6px 14px;
    font-family:'DM Sans',sans-serif;
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    cursor:pointer;
    border-radius:2px;
    transition:all .2s;
  }
  .logout-btn:hover{border-color:#555;color:#999;}

  /* ===== FORM ===== */
  .aform{background:#111;border:1px solid #1a1a1a;border-radius:4px;padding:1.5rem;}
  .ftitle{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:#555;margin-bottom:1.2rem;}
  .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .fg{display:flex;flex-direction:column;gap:6px;}
  .fg.full{grid-column:1/-1;}
  .fg label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#444;}
  .fg input,.fg select,.fg textarea{
    background:#0a0a0a;
    border:1px solid #1e1e1e;
    color:#ccc;
    font-family:'DM Sans',sans-serif;
    font-size:13px;
    padding:9px 12px;
    border-radius:2px;
    outline:none;
  }
  .fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#333;}
  .fg select option{background:#111;}
  .fg textarea{resize:vertical;min-height:70px;}

  .photos-area{border:1px dashed #222;border-radius:2px;padding:1rem;cursor:pointer;position:relative;transition:border-color .2s;}
  .photos-area:hover{border-color:#444;}
  .photos-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .photos-hint{font-size:11px;color:#444;letter-spacing:1px;pointer-events:none;text-align:center;padding:.5rem 0;}
  .photo-previews{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .pprev{width:64px;height:80px;border-radius:2px;overflow:hidden;border:1px solid #222;position:relative;flex-shrink:0;}
  .pprev img{width:100%;height:100%;object-fit:contain;display:block;}
  .pprev-rm{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.7);border:none;color:#aaa;cursor:pointer;font-size:10px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;}

  .color-input-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;}
  .color-input-row input[type=text]{flex:1;}
  .color-swatch-preview{width:24px;height:24px;border-radius:50%;border:1px solid #333;flex-shrink:0;transition:background .2s;}
  .color-add-btn{background:none;border:1px solid #333;color:#666;padding:6px 12px;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all .2s;white-space:nowrap;}
  .color-add-btn:hover{border-color:#555;color:#999;}
  .color-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
  .ctag{display:flex;align-items:center;gap:6px;background:#1a1a1a;border:1px solid #222;border-radius:2px;padding:4px 10px;font-size:11px;color:#777;}
  .ctag .csw{width:10px;height:10px;border-radius:50%;border:1px solid #333;flex-shrink:0;}
  .ctag button{background:none;border:none;color:#444;cursor:pointer;font-size:12px;line-height:1;margin-left:2px;}
  .ctag button:hover{color:#888;}

  .size-input-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;}
  .size-input-row input{flex:1;}
  .size-add-btn{background:none;border:1px solid #333;color:#666;padding:6px 12px;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all .2s;white-space:nowrap;}
  .size-add-btn:hover{border-color:#555;color:#999;}
  .size-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
  .stag{display:flex;align-items:center;gap:4px;background:#1a1a1a;border:1px solid #222;border-radius:2px;padding:4px 10px;font-size:11px;color:#777;letter-spacing:1px;}
  .stag button{background:none;border:none;color:#444;cursor:pointer;font-size:12px;line-height:1;margin-left:2px;}
  .stag button:hover{color:#888;}

  .fact{display:flex;gap:8px;margin-top:14px;}
  .btn-g{background:none;color:#555;border:1px solid #222;padding:10px 16px;font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .2s;}
  .btn-g:hover{border-color:#444;color:#888;}

  /* ===== PRODUCT LIST ===== */
  .alist-title{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:#555;}
  .alist{display:flex;flex-direction:column;gap:8px;}
  .aitem{background:#111;border:1px solid #1a1a1a;border-radius:2px;display:flex;align-items:center;gap:12px;padding:10px 14px;transition:border-color .2s;}
  .aitem:hover{border-color:#2a2a2a;}
  .athumb{width:40px;height:52px;background:#0a0a0a;border-radius:2px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .athumb img{width:100%;height:100%;object-fit:contain;}
  .athumb svg{opacity:.2;}
  .ainfo{flex:1;min-width:0;}
  .ainame{font-size:13px;color:#aaa;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .aimeta{font-size:10px;color:#444;letter-spacing:1px;text-transform:uppercase;}
  .aiprice{font-family:'Bebas Neue',sans-serif;font-size:18px;color:#666;letter-spacing:1px;flex-shrink:0;}
  .delbtn{background:none;border:1px solid #1e1e1e;color:#444;padding:5px 10px;font-size:11px;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all .2s;flex-shrink:0;}
  .delbtn:hover{border-color:#555;color:#888;}
  .empty{text-align:center;padding:2rem;color:#333;font-size:13px;letter-spacing:1px;}

  /* ===== FOOTER ===== */
  .sfooter{
    padding:2rem;
    border-top:1px solid #161616;
    display:flex;
    justify-content:space-between;
    align-items:center;
    max-width:900px;
    width:100%;
    margin:0 auto;
  }
  .fbn{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:5px;color:#252525;}
  .fbs{font-size:9px;letter-spacing:3px;color:#222;text-transform:uppercase;}
  .ftxt{font-size:10px;color:#2a2a2a;letter-spacing:1.5px;text-transform:uppercase;}

  /* ===== MOBILE ===== */
  @media (max-width:768px){
    .hdr{padding:0 1rem;}
    .admin-wrap{padding:1.2rem;}
    .fgrid{grid-template-columns:1fr;}
    .sfooter{flex-direction:column;gap:12px;text-align:center;padding:1.5rem 1rem;}
  }
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">Too Blessed<span>Imports</span></div>
  <div class="hdr-tag">Painel Admin</div>
</header>

<!-- ===== ADMIN PANEL ===== -->
<div id="adminPanel" style="display:flex;flex:1;flex-direction:column;"
  <div class="admin-wrap">

    <div class="panel-hdr">
      <div class="panel-title">Painel Admin<span>Too Blessed Imports</span></div>
    </div>

    <!-- FORM -->
    <div class="aform">
      <div class="ftitle" id="ftitle">Adicionar produto</div>
      <div class="fgrid">

        <div class="fg full">
          <label>Fotos do produto (pode adicionar várias)</label>
          <div class="photos-area" id="photosArea">
            <input type="file" accept="image/*" multiple id="imgFiles" onchange="addPhotos(event)"/>
            <div class="photos-hint" id="photosHint">Clique para selecionar fotos — primeira foto será a capa</div>
          </div>
          <div class="photo-previews" id="photoPreviews"></div>
        </div>

        <div class="fg"><label>Nome do produto</label><input type="text" id="fName" placeholder="Ex: Air Max 2026"/></div>
        <div class="fg"><label>Preço (R$)</label><input type="number" id="fPrice" placeholder="0"/></div>

        <div class="fg"><label>Categoria</label>
          <select id="fCat">
            <option value="tenis">Tênis</option>
            <option value="roupas">Roupas</option>
            <option value="acessorios">Acessórios</option>
          </select>
        </div>

        <div class="fg"><label>Badge</label>
          <select id="fBadge" onchange="toggleSale()">
            <option value="">Nenhum</option>
            <option value="novo">Novo</option>
            <option value="destaque">Destaque</option>
            <option value="sale">Sale</option>
          </select>
        </div>

        <div class="fg" id="opGroup" style="display:none;">
          <label>Preço original (riscado)</label>
          <input type="number" id="fOld" placeholder="0"/>
        </div>

        <div class="fg full"><label>Descrição</label><textarea id="fDesc" placeholder="Detalhes do produto..."></textarea></div>

        <div class="fg full">
          <label>Tamanhos disponíveis</label>
          <div class="size-input-row">
            <input type="text" id="sizeInput" placeholder="Ex: 38, P, M, G, 42..."
                   onkeydown="if(event.key==='Enter'){event.preventDefault();addSize()}"/>
            <button class="size-add-btn" onclick="addSize()">+ Adicionar</button>
          </div>
          <div class="size-tags" id="sizeTags"></div>
        </div>

        <div class="fg full">
          <label>Cores disponíveis</label>
          <div class="color-input-row">
            <input type="text" id="colorName" placeholder="Nome da cor (ex: Preto, Branco, Azul Royal...)"/>
            <div class="color-swatch-preview" id="colorSwatch" style="background:#888;"></div>
            <input type="color" id="colorPicker" value="#888888" oninput="updateSwatch()"
                   style="width:36px;height:36px;padding:2px;background:#111;border:1px solid #333;border-radius:2px;cursor:pointer;flex-shrink:0;"/>
            <button class="color-add-btn" onclick="addColor()">+ Adicionar</button>
          </div>
          <div class="color-tags" id="colorTags"></div>
        </div>

      </div>
      <div class="fact">
        <button class="btn-p" id="saveBtn" onclick="saveProduct()">Salvar produto</button>
        <button class="btn-g" id="cancelEditBtn" onclick="cancelEdit()" style="display:none;">Cancelar edição</button>
      </div>
    </div>

    <!-- PRODUCT LIST -->
    <div class="alist-title">Produtos cadastrados</div>
    <div class="alist" id="alist"></div>

  </div>

  <footer class="sfooter">
    <div><div class="fbn">Too Blessed</div><div class="fbs">Imports</div></div>
    <div class="ftxt">Painel administrativo</div>
  </footer>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD9fPLS2maJ6YtDqREx0ZL5VIBS7jMQVHc",
  authDomain: "mostruario-9d9b3.firebaseapp.com",
  projectId: "mostruario-9d9b3",
  storageBucket: "mostruario-9d9b3.firebasestorage.app",
  messagingSenderId: "137348904028",
  appId: "1:137348904028:web:d58cf29a4ee4e493b02299"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const svgFb = {
  tenis: `<svg width="40" height="40" viewBox="0 0 90 90" fill="none"><path d="M12 58c0 0 8-10 18-12l10-2 12-16 12-5 8 3 2 10-5 5-20 5-7 10-30 2z" stroke="#fff" stroke-width="1.5" fill="none"/><path d="M12 58l2 8h62l2-8" stroke="#fff" stroke-width="1.5" fill="none"/></svg>`,
  roupas: `<svg width="40" height="40" viewBox="0 0 90 90" fill="none"><path d="M30 18l-18 12 8 6 3-3v36h44V33l3 3 8-6-18-12c0 0-5 10-15 10s-15-10-15-10z" stroke="#fff" stroke-width="1.5" fill="none"/></svg>`,
  acessorios: `<svg width="40" height="40" viewBox="0 0 90 90" fill="none"><rect x="22" y="34" width="46" height="40" rx="3" stroke="#fff" stroke-width="1.5" fill="none"/><path d="M32 34v-8a13 13 0 0126 0v8" stroke="#fff" stroke-width="1.5" fill="none"/></svg>`
};

const namedColors = {
  'preto':'#111111','branco':'#f5f5f5','cinza':'#888888','cinza claro':'#cccccc','cinza escuro':'#444444',
  'vermelho':'#c0392b','azul':'#2980b9','azul royal':'#1a3a8f','azul claro':'#5dade2','verde':'#27ae60',
  'amarelo':'#f1c40f','laranja':'#e67e22','rosa':'#e91e8c','roxo':'#8e44ad','marrom':'#7b4a2d',
  'bege':'#d4b896','dourado':'#c9a227','prata':'#b0bec5','off white':'#f0ede6','vinho':'#7b1c3e'
};

let products = [];
let editId = null, pendingPhotos = [], pendingSizes = [], pendingColors = [];

// ===== DATA =====
async function loadAndRender() {
  try {
    const snap = await db.collection("produtos").get();
    products = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
  } catch(e) {
    console.error("Erro ao carregar:", e);
    products = [];
  }
  renderAList();
}

// ===== FORM HELPERS =====
function toggleSale() {
  document.getElementById('opGroup').style.display =
    document.getElementById('fBadge').value === 'sale' ? 'block' : 'none';
}

function updateSwatch() {
  document.getElementById('colorSwatch').style.background = document.getElementById('colorPicker').value;
}

function addSize() {
  const inp = document.getElementById('sizeInput');
  const val = inp.value.trim();
  if (!val) return;
  val.split(',').map(v => v.trim()).filter(Boolean).forEach(v => {
    if (!pendingSizes.includes(v)) pendingSizes.push(v);
  });
  inp.value = '';
  renderSizeTags();
}

function removeSize(s) { pendingSizes = pendingSizes.filter(x => x !== s); renderSizeTags(); }

function renderSizeTags() {
  document.getElementById('sizeTags').innerHTML = pendingSizes.map(s =>
    `<div class="stag">${s}<button onclick="removeSize('${s}')">×</button></div>`).join('');
}

function addColor() {
  const name = document.getElementById('colorName').value.trim();
  const hex = document.getElementById('colorPicker').value;
  if (!name) return;
  const resolvedHex = namedColors[name.toLowerCase()] || hex;
  if (!pendingColors.find(c => c.name.toLowerCase() === name.toLowerCase()))
    pendingColors.push({ name, hex: resolvedHex });
  document.getElementById('colorName').value = '';
  renderColorTags();
}

function removeColor(name) { pendingColors = pendingColors.filter(c => c.name !== name); renderColorTags(); }

function renderColorTags() {
  document.getElementById('colorTags').innerHTML = pendingColors.map(c =>
    `<div class="ctag"><div class="csw" style="background:${c.hex}"></div>${c.name}<button onclick="removeColor('${c.name}')">×</button></div>`).join('');
}

function addPhotos(e) {
  Array.from(e.target.files).forEach(f => {
    const reader = new FileReader();
    reader.onload = ev => { pendingPhotos.push(ev.target.result); renderPhotoPreviews(); };
    reader.readAsDataURL(f);
  });
  document.getElementById('imgFiles').value = '';
}

function removePhoto(i) { pendingPhotos.splice(i, 1); renderPhotoPreviews(); }

function renderPhotoPreviews() {
  document.getElementById('photosHint').style.display = pendingPhotos.length ? 'none' : 'block';
  document.getElementById('photoPreviews').innerHTML = pendingPhotos.map((img, i) =>
    `<div class="pprev"><img src="${img}"/><button class="pprev-rm" onclick="removePhoto(${i})">×</button></div>`).join('');
}

// ===== SAVE =====
async function saveProduct() {
  const name = document.getElementById('fName').value.trim();
  const price = parseFloat(document.getElementById('fPrice').value);
  const cat = document.getElementById('fCat').value;
  const badge = document.getElementById('fBadge').value;
  const desc = document.getElementById('fDesc').value.trim();
  const oldPrice = badge === 'sale' ? parseFloat(document.getElementById('fOld').value) || null : null;
  if (!name || !price || !desc) { alert("Preencha nome, preço e descrição."); return; }
  const discount = oldPrice && price ? Math.round((1 - price / oldPrice) * 100) : null;
  const data = {
    name, price, cat, badge: badge || null, desc, oldPrice, discount,
    sizes: [...pendingSizes], colors: [...pendingColors],
    photos: pendingPhotos.length ? [...pendingPhotos] : []
  };
  try {
    if (editId) {
      await db.collection("produtos").doc(String(editId)).update(data);
      const idx = products.findIndex(p => p.id == editId);
      if (idx !== -1) products[idx] = { id: editId, ...data };
    } else {
      const docRef = await db.collection("produtos").add(data);
      products.push({ id: docRef.id, ...data });
    }
    resetForm();
    renderAList();
  } catch(e) { console.error("Erro ao salvar:", e); alert("Erro ao salvar."); }
}

// ===== EDIT / DELETE =====
function editProduct(id) {
  const p = products.find(x => x.id === id); if (!p) return;
  editId = id;
  document.getElementById('fName').value = p.name;
  document.getElementById('fPrice').value = p.price;
  document.getElementById('fCat').value = p.cat;
  document.getElementById('fBadge').value = p.badge || '';
  document.getElementById('fDesc').value = p.desc;
  document.getElementById('fOld').value = p.oldPrice || '';
  document.getElementById('opGroup').style.display = p.badge === 'sale' ? 'block' : 'none';
  pendingSizes = [...(p.sizes || [])];
  pendingColors = [...(p.colors || [])];
  pendingPhotos = [...(p.photos || [])];
  renderSizeTags(); renderColorTags(); renderPhotoPreviews();
  document.getElementById('ftitle').textContent = 'Editar produto';
  document.getElementById('saveBtn').textContent = 'Salvar alterações';
  document.getElementById('cancelEditBtn').style.display = 'block';
  document.querySelector('.aform').scrollIntoView({ behavior: 'smooth' });
}

async function deleteProduct(id) {
  if (!confirm("Remover este produto?")) return;
  try {
    await db.collection("produtos").doc(String(id)).delete();
    products = products.filter(p => p.id !== id);
    if (editId === id) cancelEdit();
    renderAList();
  } catch(e) { console.error(e); }
}

function cancelEdit() { editId = null; resetForm(); }

function resetForm() {
  ['fName','fPrice','fDesc','fOld'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fCat').value = 'tenis';
  document.getElementById('fBadge').value = '';
  document.getElementById('opGroup').style.display = 'none';
  pendingPhotos = []; pendingSizes = []; pendingColors = [];
  renderPhotoPreviews(); renderSizeTags(); renderColorTags();
  document.getElementById('photosHint').style.display = 'block';
  document.getElementById('ftitle').textContent = 'Adicionar produto';
  document.getElementById('saveBtn').textContent = 'Salvar produto';
  document.getElementById('cancelEditBtn').style.display = 'none';
}

// ===== RENDER LIST =====
function renderAList() {
  const el = document.getElementById('alist');
  if (!products.length) {
    el.innerHTML = '<div class="empty">Nenhum produto cadastrado.</div>';
    return;
  }
  el.innerHTML = products.map(p => `
    <div class="aitem">
      <div class="athumb">${p.photos && p.photos[0]
        ? `<img src="${p.photos[0]}"/>`
        : (svgFb[p.cat] || svgFb.roupas)}</div>
      <div class="ainfo">
        <div class="ainame">${p.name}</div>
        <div class="aimeta">${p.cat}${p.badge ? ' · ' + p.badge : ''}</div>
      </div>
      <div class="aiprice">R$${p.price}</div>
      <button class="delbtn" onclick="editProduct('${p.id}')">Editar</button>
      <button class="delbtn" onclick="deleteProduct('${p.id}')">Remover</button>
    </div>`).join('');
}

window.addEventListener('load', loadAndRender);
</script>
</body>
</html>
